<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laush - İndir</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: rgba(30,30,30,0.9);
            border-radius: 32px;
            padding: 60px 40px;
            text-align: center;
            max-width: 420px;
            border: 1px solid #333;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            animation: fadeIn 1s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo {
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .logo img {
            width: 100%;
            height: 100%;
            border-radius: 20px;
        }
        
        h1 {
            color: white;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        
        .tagline {
            color: #888;
            font-size: 16px;
            margin-bottom: 36px;
        }
        
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #9C27B0, #E91E63);
            color: white;
            padding: 20px 48px;
            border-radius: 60px;
            text-decoration: none;
            font-size: 20px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(156,39,176,0.5);
        }
        
        .download-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(156,39,176,0.7);
        }
        
        .download-btn svg {
            width: 24px;
            height: 24px;
        }
        
        .version {
            color: #555;
            font-size: 13px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="logo.svg" alt="Laush">
        </div>
        
        <h1>Laush</h1>
        <p class="tagline">Sosyal ağ yeniden tanımlanıyor</p>
        
        <a href="https://github.com/vedat58/laush/releases/latest/download/app-debug.apk" class="download-btn" download>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            İndir
        </a>
        
        <p class="version">v1.0.0 • Android 14+</p>
    </div>
</body>
</html>
